<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zamawiarka</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <div class="container">
      <h1>🎂 Zamawiarka</h1>
      <div id="cart-summary" class="cart-summary" style="display:none">
        <button id="btn-cart" class="btn btn-cart">
          Koszyk (<span id="cart-count">0</span>) &bull; <span id="cart-total">0,00 zł</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- Komunikaty -->
    <div id="message" class="message" style="display:none"></div>

    <!-- Ładowanie -->
    <div id="loading" class="loading">Ładowanie produktów…</div>

    <!-- Siatka produktów -->
    <div id="items-grid" class="items-grid" style="display:none"></div>

    <!-- Koszyk -->
    <section id="cart-section" class="cart-section" style="display:none">
      <h2>Twój koszyk</h2>
      <ul id="cart-list" class="cart-list"></ul>
      <div class="cart-footer">
        <strong>Razem: <span id="cart-total-big">0,00 zł</span></strong>
      </div>

      <form id="order-form" class="order-form">
        <h3>Dane zamówienia</h3>

        <div class="form-row">
          <label for="order-type">Typ zamówienia *</label>
          <select id="order-type" required>
            <option value="PICK_UP">Odbiór osobisty</option>
            <option value="DINE_IN">Na miejscu</option>
            <option value="DELIVERY">Dostawa</option>
            <option value="ROOM_SERVICE">Room service</option>
          </select>
        </div>

        <div class="form-row">
          <label for="customer-name">Imię i nazwisko</label>
          <input type="text" id="customer-name" placeholder="Jan Kowalski" />
        </div>

        <div class="form-row">
          <label for="phone">Telefon</label>
          <input type="tel" id="phone" placeholder="+48 123 456 789" />
        </div>

        <div class="form-row">
          <label for="notes">Uwagi</label>
          <textarea id="notes" rows="3" placeholder="Np. bez orzechów, urodzinowy napis…"></textarea>
        </div>

        <div class="form-actions">
          <button type="button" id="btn-back" class="btn btn-secondary">← Wróć do menu</button>
          <button type="submit" id="btn-submit" class="btn btn-primary">Złóż zamówienie</button>
        </div>
      </form>
    </section>

    <!-- Potwierdzenie -->
    <section id="confirmation-section" class="confirmation" style="display:none">
      <div class="confirmation-box">
        <div class="check">✓</div>
        <h2>Zamówienie złożone!</h2>
        <p id="confirmation-details"></p>
        <button id="btn-new-order" class="btn btn-primary">Złóż kolejne zamówienie</button>
      </div>
    </section>

  </main>

  <script src="/js/app.js"></script>
</body>
</html>
